<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXBIS 제조 통합 포털 (Cloud Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="text-slate-800 min-h-screen antialiased flex flex-col transition-colors duration-200">

    <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 pointer-events-none z-[9999]"></div>

    <div id="login-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-200 relative" id="login-box">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl border border-indigo-100 shadow-inner"><i class="fa-solid fa-layer-group"></i></div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight" id="auth-title">AXBIS</h2>
                <h2 class="text-xl font-bold text-slate-700 tracking-tight mt-2">제조 통합 포털</h2>
            </div>
            <div id="login-view" class="space-y-4">
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase">이메일 계정</label><input type="email" id="login-id" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold" placeholder="name@company.com"></div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase">비밀번호</label><input type="password" id="login-pw" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold" placeholder="6자리 이상" onkeypress="if(event.key==='Enter') window.checkLogin()"></div>
                <div id="login-error" class="text-rose-500 text-[11px] font-bold hidden text-center mt-2 bg-rose-50 p-3 rounded-xl border border-rose-100"></div>
                <div class="pt-4 space-y-3">
                    <button onclick="window.checkLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 rounded-xl shadow-md transition-all">접속하기</button>
                    <button onclick="window.toggleAuthMode('signup')" class="w-full bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 font-bold py-3.5 rounded-xl transition-all text-sm">신규 계정 생성</button>
                </div>
            </div>
            <div id="signup-view" class="space-y-4 hidden">
                <div class="flex gap-3">
                    <div class="flex-1"><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase">이름</label><input type="text" id="signup-name" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold"></div>
                    <div class="flex-1"><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase">소속 팀</label>
                        <select id="signup-dept" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold">
                            <option value="AXBIS">AXBIS</option>
                            <option value="레이저사업본부">레이저사업본부</option>
                            <option value="제조기술팀">제조기술팀</option>
                            <option value="장비기술팀">장비기술팀</option>
                            <option value="모듈기술팀">모듈기술팀</option>
                            <option value="제어팀">제어팀</option>
                            <option value="pm팀">pm팀</option>
                            <option value="영업팀">영업팀</option>
                            <option value="전략기획팀">전략기획팀</option>
                            <option value="전략구매팀">전략구매팀</option>
                            <option value="품질경영팀">품질경영팀</option>
                            <option value="설계팀">설계팀</option>
                            <option value="선행설계팀">선행설계팀</option>
                            <option value="공정개발팀">공정개발팀</option>
                            <option value="SW팀">SW팀</option>
                            <option value="선행기술팀">선행기술팀</option>
                            <option value="피플팀">피플팀</option>
                            <option value="북미법인">북미법인</option>
                            <option value="기술연구소">기술연구소</option>
                        </select>
                    </div>
                </div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase">이메일 계정</label><input type="email" id="signup-id" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold"></div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase">비밀번호</label><input type="password" id="signup-pw" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold"></div>
                <div id="signup-error" class="text-rose-500 text-[11px] font-bold hidden text-center mt-2 bg-rose-50 p-3 rounded-xl border border-rose-100"></div>
                <div class="pt-4 space-y-3">
                    <button onclick="window.signUp()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3.5 rounded-xl shadow-md transition-all">가입 완료</button>
                    <button onclick="window.toggleAuthMode('login')" class="w-full bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 font-bold py-3.5 rounded-xl transition-all text-sm">뒤로 가기</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/50 z-[100] hidden transition-opacity" onclick="window.toggleSidebar(false)"></div>
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl z-[110] transform -translate-x-full sidebar-transition flex flex-col">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50"><span class="text-indigo-600 font-black tracking-tighter text-xl">AXBIS</span><button onclick="window.toggleSidebar(false)" class="text-slate-400 hover:text-rose-500 p-1"><i class="fa-solid fa-xmark text-xl"></i></button></div>
        <div class="p-4 bg-indigo-50 border-b border-indigo-100 flex flex-col gap-1"><span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Signed in as</span><div class="font-black text-indigo-700 text-sm truncate" id="sidebar-user-name">User Name</div><div class="text-xs text-slate-500 font-medium" id="sidebar-team-badge">Team</div></div>
        
        <nav class="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar">
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-3 mt-2 mb-2">Dashboards</div>
            <button onclick="window.openApp('dashboard-home', '통합 대시보드')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-100 hover:text-indigo-600 transition-colors text-left group"><div class="w-6 text-center text-slate-400 group-hover:text-indigo-500"><i class="fa-solid fa-chart-pie"></i></div> 통합 대시보드</button>
            <div class="border-t border-slate-100 my-3"></div>
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-3 mb-2">현황판 (팀)</div>
            <button onclick="window.openApp('project-status', 'PJT 현황판')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-100 hover:text-indigo-600 transition-colors text-left group"><div class="w-6 text-center text-slate-400 group-hover:text-indigo-500"><i class="fa-solid fa-table-list"></i></div> PJT 현황판</button>
            <button onclick="window.openApp('workhours', '개인별 투입공수 현황')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-100 hover:text-indigo-600 transition-colors text-left group"><div class="w-6 text-center text-slate-400 group-hover:text-indigo-500"><i class="fa-solid fa-user-clock"></i></div> 개인별 투입공수 현황</button>
            <button onclick="window.openApp('weekly-log', '주간 업무 일지')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-100 hover:text-indigo-600 transition-colors text-left group"><div class="w-6 text-center text-slate-400 group-hover:text-indigo-500"><i class="fa-solid fa-calendar-week"></i></div> 주간 업무 일지</button>
        </nav>
        <div class="p-4 border-t border-slate-100 flex flex-col gap-2 bg-slate-50">
            <button id="btn-admin" onclick="window.openAdminModal()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-xs font-bold text-purple-600 bg-purple-50 hover:bg-purple-100 transition-colors border border-purple-200 hidden"><i class="fa-solid fa-users-gear"></i> 시스템 관리자</button>
            <button onclick="window.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-xs font-bold text-slate-500 hover:bg-rose-50 hover:text-rose-500 transition-colors border border-slate-200 hover:border-rose-200"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</button>
        </div>
    </aside>

    <div id="portal-container" class="hidden flex-1 flex flex-col min-h-screen">
        <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b border-slate-200">
            <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between w-full">
                <div class="flex items-center gap-2 sm:gap-4"><button onclick="window.toggleSidebar(true)" class="text-slate-500 hover:text-indigo-600 text-xl"><i class="fa-solid fa-bars"></i></button><button onclick="window.navigateHome()" class="text-slate-500 hover:text-indigo-600 text-lg ml-1"><i class="fa-solid fa-house"></i></button><div class="h-6 w-px bg-slate-200 hidden sm:block mx-1"></div><span class="text-indigo-600 font-black tracking-tighter hidden sm:block">AXBIS</span><h1 class="text-lg font-black text-slate-800 tracking-tight flex items-center gap-3"><span id="nav-title" class="text-[13px] font-bold text-slate-500">통합 대시보드 홈</span></h1></div>
                
                <div class="flex items-center gap-4">
                    <div class="relative cursor-pointer flex items-center justify-center" onclick="window.toggleNotifications(event)">
                        <i class="fa-solid fa-bell text-slate-400 hover:text-indigo-500 text-xl transition-colors"></i>
                        <span id="notification-badge" class="absolute -top-1.5 -right-1.5 flex h-4 w-4 hidden">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-4 w-4 bg-rose-500 text-[9px] text-white justify-center items-center font-bold shadow-sm" id="notification-count">0</span>
                        </span>
                        <div id="notification-dropdown" class="absolute right-0 top-8 mt-2 w-80 bg-white rounded-2xl shadow-xl border border-slate-200 hidden flex-col overflow-hidden z-[9999] cursor-default" onclick="event.stopPropagation()">
                            <div class="px-4 py-3 border-b border-slate-100 bg-slate-50 font-bold text-sm text-slate-700 flex justify-between items-center">
                                <span>🔔 알림</span>
                                <div class="flex gap-3">
                                    <button onclick="window.markAllNotificationsRead()" class="text-[10px] text-indigo-500 hover:underline">모두 읽음</button>
                                    <button onclick="window.deleteAllNotifications()" class="text-[10px] text-rose-500 hover:underline">전체 삭제</button>
                                </div>
                            </div>
                            <div id="notification-list" class="max-h-80 overflow-y-auto custom-scrollbar flex flex-col divide-y divide-slate-50">
                                <div class="p-6 text-center text-slate-400 text-xs font-bold">알림이 없습니다.</div>
                            </div>
                        </div>
                    </div>
                    <div id="nav-role-badge" class="px-2.5 py-1 rounded-md text-[10px] font-bold text-white shadow-sm">역할</div>
                </div>
            </div>
        </header>

        <main id="app-content" class="flex-1 max-w-[1600px] mx-auto w-full px-6 py-8">
        </main>
    </div>

    <ul id="mention-dropdown" class="hidden absolute z-[9999] bg-white border border-slate-200 shadow-xl rounded-xl max-h-48 overflow-y-auto text-sm w-48 custom-scrollbar"></ul>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
