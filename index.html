<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXBIS 제조 통합 포털 (Cloud Pro)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="text-slate-800 min-h-screen antialiased flex flex-col bg-slate-50">

    <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 pointer-events-none z-[9999]"></div>

    <div id="login-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm">
        </div>

    <div id="portal-container" class="hidden flex-1 flex flex-col min-h-screen">
        <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-200">
            </header>

        <main id="app-content" class="flex-1 max-w-[1600px] mx-auto w-full px-6 py-8">
            </main>
    </div>

    <div id="project-detail-modal" class="fixed inset-0 z-[500] hidden items-center justify-center bg-slate-900/70 backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-indigo-50">
                <h2 class="text-lg font-black text-indigo-800" id="pjt-modal-title">프로젝트 상세 관리</h2>
                <button onclick="window.closeProjectDetailModal()" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-white space-y-6">
                <input type="hidden" id="pjt-detail-id">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="p-4 bg-blue-50/50 rounded-2xl border border-blue-100 space-y-3">
                        <h3 class="font-bold text-blue-700 flex items-center gap-2"><i class="fa-solid fa-cart-shopping"></i> 구매 관리</h3>
                        <textarea id="pjt-buy-text" class="w-full h-24 p-3 text-xs border rounded-xl focus:ring-2 ring-blue-400 outline-none" placeholder="구매 내역 요약..."></textarea>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500">구매품 일정표 (Excel/PDF)</label>
                            <input type="file" id="pjt-buy-file" class="block w-full text-[10px] text-slate-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-blue-100 file:text-blue-700">
                            <div id="pjt-buy-file-link" class="text-[10px] mt-1 font-bold text-blue-600 hidden"></div>
                        </div>
                    </div>

                    <div class="p-4 bg-emerald-50/50 rounded-2xl border border-emerald-100 space-y-3">
                        <h3 class="font-bold text-emerald-700 flex items-center gap-2"><i class="fa-solid fa-pen-ruler"></i> 설계 관리</h3>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500">설계 파일 업로드 (도면 등)</label>
                            <input type="file" id="pjt-design-file" class="block w-full text-[10px] text-slate-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-emerald-100 file:text-emerald-700">
                            <div id="pjt-design-file-link" class="text-[10px] mt-1 font-bold text-emerald-600 hidden"></div>
                        </div>
                        <p class="text-[10px] text-slate-400">* 설계 관련 주요 이슈는 생산일지에 통합 기록하세요.</p>
                    </div>

                    <div class="p-4 bg-amber-50/50 rounded-2xl border border-amber-100 space-y-3">
                        <h3 class="font-bold text-amber-700 flex items-center gap-2"><i class="fa-solid fa-calendar-check"></i> 프로젝트 일정</h3>
                        <textarea id="pjt-sch-text" class="w-full h-24 p-3 text-xs border rounded-xl focus:ring-2 ring-amber-400 outline-none" placeholder="주요 일정 및 마일스톤..."></textarea>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500">프로젝트 일정표 첨부</label>
                            <input type="file" id="pjt-sch-file" class="block w-full text-[10px] text-slate-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-amber-100 file:text-amber-700">
                            <div id="pjt-sch-file-link" class="text-[10px] mt-1 font-bold text-amber-600 hidden"></div>
                        </div>
                    </div>
                </div>

                <div class="border-t pt-4">
                    <h3 class="font-bold text-slate-700 mb-2">기존 진행 현황 (생산일지)</h3>
                    <textarea id="pjt-detail-status" class="w-full h-32 p-4 border rounded-2xl focus:ring-2 ring-indigo-500 outline-none" placeholder="전체적인 진행 상황을 입력하세요..."></textarea>
                </div>
            </div>
            <div class="px-6 py-4 border-t bg-slate-50 flex justify-end gap-2">
                <button onclick="window.closeProjectDetailModal()" class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold">취소</button>
                <button onclick="window.saveProjectDetail()" class="px-8 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-indigo-700">변경 내용 저장</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
