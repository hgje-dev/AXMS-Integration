    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        input:focus, select:focus, textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        input[type="number"], input[type="text"], input[type="date"], select { transition: all 0.2s ease-in-out; }
        input:disabled, select:disabled { background-color: #f1f5f9; cursor: not-allowed; color: #94a3b8; border-color: #e2e8f0; opacity: 0.8; }
        
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; z-index: 9999; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        
        html.dark { background-color: #0f172a; color: #f1f5f9; }
        html.dark body { background-color: #0f172a; color: #f1f5f9; }
        html.dark .bg-white { background-color: #1e293b !important; border-color: #334155 !important; }
        html.dark .bg-slate-50 { background-color: #0f172a !important; border-color: #334155 !important; }
        html.dark .text-slate-800 { color: #f8fafc !important; }
        html.dark .text-slate-700 { color: #f1f5f9 !important; }
        html.dark .text-slate-600 { color: #cbd5e1 !important; }
        html.dark .text-slate-500 { color: #94a3b8 !important; }
        html.dark .border-slate-200 { border-color: #334155 !important; }
        html.dark input:not([type="checkbox"]), html.dark select { background-color: #334155 !important; color: #f8fafc !important; border-color: #475569 !important; }
    </style>
</head>
<body class="text-slate-800 min-h-screen antialiased flex flex-col transition-colors duration-200">

    <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 pointer-events-none z-[9999]"></div>

    <div id="login-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-200 relative" id="login-box">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl border border-indigo-100 shadow-inner"><i class="fa-solid fa-layer-group"></i></div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight" id="auth-title">AXBIS</h2>
                <h2 class="text-xl font-bold text-slate-700 tracking-tight mt-2">제조 통합 포털</h2>
                <p class="text-sm text-slate-500 mt-1 font-medium" id="login-subtitle">협업 플랫폼에 오신 것을 환영합니다.</p>
            </div>
            <div id="login-view" class="space-y-4">
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-widest">이메일 계정</label><input type="email" id="login-id" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold" placeholder="name@company.com"></div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-widest">비밀번호</label><input type="password" id="login-pw" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold" placeholder="6자리 이상" onkeypress="if(event.key==='Enter') window.checkLogin()"></div>
                <div id="login-error" class="text-rose-500 text-[11px] font-bold hidden text-center mt-2 bg-rose-50 p-3 rounded-xl border border-rose-100"></div>
                <div class="pt-4 space-y-3" id="action-buttons-login">
                    <button onclick="window.checkLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 rounded-xl shadow-md transition-all">접속하기</button>
                    <button onclick="window.toggleAuthMode('signup')" class="w-full bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 font-bold py-3.5 rounded-xl transition-all text-sm">신규 계정 생성</button>
                </div>
            </div>
            <div id="signup-view" class="space-y-4 hidden">
                <div class="flex gap-3">
                    <div class="flex-1"><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase">이름</label><input type="text" id="signup-name" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold" placeholder="홍길동"></div>
                    <div class="flex-1"><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase">소속 팀</label>
                        <select id="signup-dept" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold text-slate-700">
                            <option value="AXBIS">AXBIS</option><option value="레이저사업본부">레이저사업본부</option><option value="제조기술팀">제조기술팀</option><option value="기타">기타</option>
                        </select>
                    </div>
                </div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-widest">이메일 계정</label><input type="email" id="signup-id" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold" placeholder="name@company.com"></div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-widest">비밀번호</label><input type="password" id="signup-pw" class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 font-bold" placeholder="6자리 이상"></div>
                <div id="signup-error" class="text-rose-500 text-[11px] font-bold hidden text-center mt-2 bg-rose-50 p-3 rounded-xl border border-rose-100 break-words"></div>
                <div class="pt-4 space-y-3" id="action-buttons-signup">
                    <button onclick="window.signUp()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3.5 rounded-xl shadow-md transition-all">가입 완료 (승인 대기)</button>
                    <button onclick="window.toggleAuthMode('login')" class="w-full bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 font-bold py-3.5 rounded-xl transition-all text-sm">뒤로 가기</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-slate-900/70 backdrop-blur-sm p-4"><div class="bg-white rounded-3xl shadow-2xl w-full max-w-6xl flex flex-col max-h-[90vh] overflow-hidden"><div class="px-6 py-4 border-b flex justify-between items-center bg-purple-50"><h2 class="text-lg font-extrabold text-purple-800 flex items-center gap-2"><i class="fa-solid fa-users-gear text-purple-500"></i> 시스템 관리자 (계정 및 권한 관리)</h2><button onclick="window.closeAdminModal()" class="text-purple-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button></div><div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-50/50"><table class="w-full text-left border-collapse bg-white shadow-sm rounded-xl overflow-hidden"><thead class="bg-slate-800 text-[11px] text-white"><tr><th class="p-3 text-center">이름</th><th class="p-3 text-center">소속 팀</th><th class="p-3 text-center">이메일</th><th class="p-3 text-center w-28">등급(Role)</th><th class="p-3 text-center">접근 권한 (체크박스)</th><th class="p-3 text-center w-24">관리</th></tr></thead><tbody id="admin-users-tbody" class="divide-y divide-slate-200 text-xs"></tbody></table></div></div></div>
    
    <div id="team-modal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-slate-900/70 backdrop-blur-sm py-10"><div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl transform transition-all border border-slate-200 flex flex-col max-h-[80vh] overflow-hidden"><div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-indigo-50"><div class="flex items-center gap-3"><h2 class="text-lg font-extrabold text-indigo-800"><i class="fa-solid fa-people-group text-indigo-500 mr-2"></i>팀원 풀(Pool) 관리</h2><span id="team-modal-count" class="text-[10px] bg-indigo-200 text-indigo-800 px-2 py-0.5 rounded-full font-bold">총 0명</span></div><button onclick="window.closeTeamModal()" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button></div><div class="p-6 overflow-y-auto flex-1 bg-slate-50 flex flex-col gap-4"><div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex gap-2 items-end"><div class="flex-1"><label class="block text-[10px] font-bold text-slate-500 mb-1">시스템 사용자 목록</label><select id="new-team-name" class="w-full border rounded p-2 text-sm"><option value="">사용자 선택</option></select></div><div class="flex-1"><label class="block text-[10px] font-bold text-slate-500 mb-1">소속 파트</label><select id="new-team-part" class="w-full border rounded p-2 text-sm"><option value="제조">제조</option><option value="광학">광학</option><option value="기타">기타</option></select></div><button onclick="window.addTeamMember()" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm font-bold hover:bg-indigo-700 transition-colors shadow-sm whitespace-nowrap">팀원 추가</button></div><div class="bg-white rounded-xl border border-slate-200 shadow-sm flex-1 overflow-hidden flex flex-col"><table class="w-full text-left border-collapse"><thead class="bg-slate-800 text-[11px] text-white sticky top-0"><tr><th class="p-3 text-center w-24">소속 파트</th><th class="p-3">이름</th><th class="p-3 text-center w-20">관리</th></tr></thead><tbody id="team-list-tbody" class="divide-y text-xs"></tbody></table></div></div></div></div>

    <div id="proj-code-master-modal" class="fixed inset-0 z-[150] hidden items-center justify-center bg-slate-900/70 backdrop-blur-sm py-10"><div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl transform transition-all border border-slate-200 flex flex-col max-h-full overflow-hidden"><div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50"><div class="flex items-center gap-3"><h2 class="text-lg font-extrabold text-slate-800"><i class="fa-solid fa-tags text-indigo-500 mr-2"></i>PJT 코드 마스터 관리</h2><button onclick="window.toggleBulkPjtInput()" class="bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm"><i class="fa-solid fa-paste mr-1"></i>일괄 등록</button><button onclick="window.deleteAllProjectCodes()" class="bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors border border-rose-200 shadow-sm"><i class="fa-solid fa-trash-can mr-1"></i>전체 삭제</button></div><button onclick="window.closeProjCodeMasterModal()" class="text-slate-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button></div><div class="p-6 overflow-y-auto flex-1 space-y-4 bg-slate-50/50"><div class="flex gap-2 bg-white p-4 rounded-xl shadow-sm border border-slate-200"><input type="text" id="new-pjt-code" placeholder="PJT 코드" class="border border-slate-300 p-2 rounded-lg text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none w-32"><input type="text" id="new-pjt-name" placeholder="프로젝트명" class="border border-slate-300 p-2 rounded-lg text-sm font-bold flex-1 focus:ring-2 focus:ring-indigo-500 outline-none"><input type="text" id="new-pjt-company" placeholder="업체명" class="border border-slate-300 p-2 rounded-lg text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none w-32"><button onclick="window.addProjectCode()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-bold shadow-sm whitespace-nowrap">단일 등록</button></div><div id="bulk-pjt-section" class="hidden bg-indigo-50 p-4 rounded-xl border border-indigo-100 shadow-inner"><label class="block text-xs font-bold text-indigo-700 mb-2">엑셀 데이터 붙여넣기 (코드 | 프로젝트명 | 업체명)</label><textarea id="bulk-pjt-input" class="w-full border p-3 rounded-lg text-sm h-32 focus:ring-2 focus:ring-indigo-500 outline-none"></textarea><div class="flex justify-end mt-2"><button onclick="window.bulkAddProjectCodes()" class="bg-emerald-600 text-white px-5 py-2 rounded-lg text-xs font-bold shadow-md">일괄 데이터 저장</button></div></div><div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><table class="w-full border-collapse text-sm text-left"><thead class="bg-slate-800 text-white text-xs"><tr><th class="p-3 w-32">PJT 코드</th><th class="p-3">프로젝트명</th><th class="p-3 w-32">업체명</th><th class="p-3 w-20 text-center">관리</th></tr></thead><tbody id="pjt-code-tbody" class="divide-y divide-slate-100"></tbody></table></div></div></div></div>

    <div id="proj-status-write-modal" class="fixed inset-0 z-[150] hidden items-center justify-center bg-slate-900/70 backdrop-blur-sm py-10"><div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl transform transition-all flex flex-col max-h-full overflow-hidden"><div class="px-6 py-4 border-b flex justify-between items-center bg-indigo-50"><h2 class="text-lg font-extrabold text-indigo-800"><i class="fa-solid fa-list-check text-indigo-500"></i> 프로젝트 현황 등록</h2><button onclick="window.closeProjStatusWriteModal()" class="text-indigo-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button></div><div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-50/50"><input type="hidden" id="ps-id"><div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="bg-white p-5 rounded-2xl shadow-sm space-y-4"><div><label class="block text-[11px] font-bold text-slate-500 mb-1">PJT 코드</label><input type="text" id="ps-code" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="window.showAutocomplete(this,'ps-name','ps-company',false)"></div><div><label class="block text-[11px] font-bold text-slate-500 mb-1">프로젝트명</label><input type="text" id="ps-name" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="window.showAutocomplete(this,'ps-code','ps-company',true)"></div><div><label class="block text-[11px] font-bold text-slate-500 mb-1">업체명</label><input type="text" id="ps-company" class="w-full border rounded-lg px-3 py-2 text-sm"></div><div class="grid grid-cols-2 gap-2"><div><label class="block text-[11px] font-bold text-slate-500 mb-1">파트</label><select id="ps-part" class="w-full border rounded-lg px-3 py-2 text-sm"><option value="제조">제조</option><option value="광학">광학</option></select></div><div><label class="block text-[11px] font-bold text-slate-500 mb-1">구분</label><select id="ps-category" class="w-full border rounded-lg px-3 py-2 text-sm"><option value="설비">설비</option><option value="개조">개조</option><option value="모듈">모듈</option><option value="기타">기타</option></select></div></div><div class="grid grid-cols-2 gap-2"><div><label class="block text-[11px] font-bold text-slate-500 mb-1">담당자</label><select id="ps-manager" class="w-full border rounded-lg px-3 py-2 text-sm"></select></div><div><label class="block text-[11px] font-bold text-slate-500 mb-1">팀원 추가</label><select id="ps-member-add" class="w-full border rounded-lg px-3 py-2 text-sm" onchange="window.addProjectMember(this.value)"><option value="">선택</option></select></div></div><div id="ps-selected-members" class="flex flex-wrap gap-1"></div><input type="hidden" id="ps-members"><div class="grid grid-cols-2 gap-2"><div><label class="block text-[11px] font-bold text-slate-500 mb-1">현재 상태</label><select id="ps-status" class="w-full border rounded-lg px-3 py-2 text-sm font-bold text-indigo-600"><option value="pending">대기/보류</option><option value="progress">진행중(제작)</option><option value="inspecting">진행중(검수)</option><option value="completed">완료(출하)</option></select></div><div><label class="block text-[11px] font-bold text-slate-500 mb-1">진행률(%)</label><input type="number" id="ps-progress-pct" class="w-full border rounded-lg px-3 py-2 text-sm"></div></div></div><div class="bg-white p-5 rounded-2xl shadow-sm space-y-4"><div class="grid grid-cols-2 gap-2"><div><label class="block text-[11px] font-bold text-sky-600 mb-1">예정 MD</label><input type="number" step="0.1" id="ps-est-md" class="w-full border rounded-lg px-3 py-2 text-sm"></div><div><label class="block text-[11px] font-bold text-purple-600 mb-1">현재 투입 MD</label><input type="number" id="ps-current-md" readonly class="w-full border bg-slate-100 rounded-lg px-3 py-2 text-sm"></div></div><div class="grid grid-cols-2 gap-2"><div><label class="block text-[11px] font-bold text-amber-600 mb-1">외주 MD</label><input type="number" step="0.1" id="ps-out-md" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="window.calcFinalMd()"></div><div><label class="block text-[11px] font-bold text-sky-600 mb-1">최종 M
