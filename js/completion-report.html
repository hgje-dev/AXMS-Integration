<div class="flex flex-col gap-6 h-full min-h-[80vh]">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 flex flex-wrap gap-4 items-center justify-between">
        <div class="flex items-center gap-3">
            <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center shadow-sm"><i class="fa-solid fa-calendar-days text-xl"></i></div>
                개인별 투입공수 현황
            </h2>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl p-1 shadow-sm">
                <button onclick="window.changeWorkhoursWeek(-1)" class="px-3 py-1.5 text-slate-400 hover:text-indigo-600 hover:bg-white rounded-lg transition-all"><i class="fa-solid fa-chevron-left"></i></button>
                <input type="week" id="workhours-week-picker" class="bg-transparent border-none text-sm font-black text-slate-700 outline-none text-center cursor-pointer w-40" onchange="window.loadWorkhoursData()">
                <button onclick="window.changeWorkhoursWeek(1)" class="px-3 py-1.5 text-slate-400 hover:text-indigo-600 hover:bg-white rounded-lg transition-all"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <button onclick="window.openWorkhoursModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm transition-colors flex items-center gap-2"><i class="fa-solid fa-plus"></i> 공수 등록</button>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex-1 flex flex-col">
        <div class="overflow-x-auto flex-1">
            <table class="w-full text-left border-collapse min-w-[1000px]">
                <thead class="bg-slate-50 text-slate-600 sticky top-0 z-10 shadow-sm border-b border-slate-200">
                    <tr>
                        </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 text-sm">
                    </tbody>
            </table>
        </div>
    </div>
</div>
