<div class="flex flex-col gap-6">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-2 border-b border-slate-200 pb-4">
        <div>
            <h2 class="text-xl font-black text-slate-800 flex items-center gap-2"><i class="fa-solid fa-chart-line text-indigo-500"></i> 프로젝트 통합 대시보드 (연간)</h2>
            <p class="text-xs text-slate-500 mt-1">제조 및 광학 파트 통합 데이터 기준</p>
        </div>
        <div class="flex items-center gap-3 mt-4 md:mt-0">
            <div class="bg-white border border-slate-200 shadow-sm px-4 py-2 rounded-xl flex items-center gap-2">
                <i class="fa-solid fa-users text-slate-400"></i>
                <span class="text-xs font-bold text-slate-600">팀 총 인원수</span>
                <span id="dash-team-count" class="text-sm font-black text-indigo-600 ml-1 border-l pl-2">0명</span>
            </div>
            <div class="flex items-center gap-2 bg-white border border-slate-200 shadow-sm px-3 py-1.5 rounded-xl">
                <i class="fa-regular fa-calendar text-slate-400"></i>
                <label class="text-xs font-bold text-slate-600 ml-1">기준 연도</label>
                <select id="dash-year-select" class="px-2 py-1 border-0 text-sm font-black text-indigo-700 bg-transparent outline-none cursor-pointer" onchange="window.processDashboardData()"></select>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 mb-2">
        <div class="bg-white rounded-2xl p-4 border shadow-sm flex flex-col justify-center border-l-[3px] border-l-emerald-400">
            <p class="text-[11px] font-bold text-slate-500 mb-1">완료 (출하)</p>
            <p class="text-2xl font-black text-emerald-600" id="dash-pd-completed">0</p>
        </div>
        <div class="bg-white rounded-2xl p-4 border shadow-sm flex flex-col justify-center border-l-[3px] border-l-sky-400">
            <p class="text-[11px] font-bold text-slate-500 mb-1">목표대비 출하 오차(평균)</p>
            <p class="text-2xl font-black text-sky-600"><span id="dash-pd-ship-error">0</span><span class="text-[10px] text-slate-400 ml-1">일</span></p>
        </div>
        <div class="bg-white rounded-2xl p-4 border shadow-sm flex flex-col justify-center border-l-[3px] border-l-indigo-400">
            <p class="text-[11px] font-bold text-slate-500 mb-1">총 예정 공수</p>
            <p class="text-2xl font-black text-indigo-600"><span id="dash-pd-estMd">0.0</span><span class="text-[10px] text-slate-400 ml-1">MD</span></p>
        </div>
        <div class="bg-white rounded-2xl p-4 border shadow-sm flex flex-col justify-center border-l-[3px] border-l-purple-400">
            <p class="text-[11px] font-bold text-slate-500 mb-1">총 투입 공수</p>
            <p class="text-2xl font-black text-purple-600"><span id="dash-pd-curMd">0.0</span><span class="text-[10px] text-slate-400 ml-1">MD</span></p>
        </div>
        <div class="bg-white rounded-2xl p-4 border shadow-sm flex flex-col justify-center border-l-[3px] border-l-amber-400">
            <p class="text-[11px] font-bold text-slate-500 mb-1">계획대비 편차율</p>
            <p class="text-2xl font-black text-amber-600" id="dash-pd-variance">0%</p>
        </div>
        <div class="bg-white rounded-2xl p-4 border shadow-sm flex flex-col justify-center border-l-[3px] border-l-fuchsia-400">
            <p class="text-[11px] font-bold text-slate-500 mb-1">팀 연간 부하율</p>
            <p class="text-2xl font-black text-fuchsia-600" id="dash-pd-workload">0.0%</p>
        </div>
        <div class="bg-white rounded-2xl p-4 border shadow-sm flex flex-col justify-center border-l-[3px] border-l-rose-400">
            <p class="text-[11px] font-bold text-slate-500 mb-1">지연/위험 PJT 수</p>
            <p class="text-2xl font-black text-rose-600" id="dash-pd-delayed">0</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-white rounded-3xl p-6 border shadow-sm flex flex-col h-[320px]">
            <h3 class="text-sm font-extrabold text-slate-700 mb-4 border-b border-slate-100 pb-3">프로젝트 진행상태 비율</h3>
            <div class="flex-1 relative w-full h-full pb-2"><canvas id="projPieChart"></canvas></div>
        </div>
        <div class="bg-white rounded-3xl p-6 border shadow-sm flex flex-col h-[320px]">
            <h3 class="text-sm font-extrabold text-slate-700 mb-4 border-b border-slate-100 pb-3">월별 출하(완료) 추이 (해당 연도 1~12월)</h3>
            <div class="flex-1 relative w-full h-full pb-2"><canvas id="projMonthlyChart"></canvas></div>
        </div>
        <div class="bg-white rounded-3xl p-6 border shadow-sm flex flex-col h-[320px]">
            <h3 class="text-sm font-extrabold text-slate-700 mb-4 border-b border-slate-100 pb-3">월별 계획공수 vs 실제 투입공수</h3>
            <div class="flex-1 relative w-full h-full pb-2"><canvas id="annualPlanVsActualChart"></canvas></div>
        </div>
    </div>
</div>
