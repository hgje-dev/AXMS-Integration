<div class="flex flex-col gap-10">
    <div>
        <div class="flex items-center justify-between mb-4 border-b border-slate-200 pb-2">
            <div><h2 class="text-xl font-black text-slate-800"><i class="fa-solid fa-chart-line text-indigo-500"></i> 프로젝트 통합 대시보드</h2></div>
            <div class="flex items-center gap-3"><div class="flex items-center gap-2 bg-slate-50 border p-1.5 rounded-xl"><label class="text-xs font-black text-slate-600 ml-2">기준 연도</label><select id="dash-year-select" class="px-3 py-1.5 border-0 rounded-lg text-xs font-bold text-indigo-700 bg-white shadow-sm outline-none cursor-pointer" onchange="window.processDashboardData()"></select></div></div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-7 gap-4 mb-6">
            <div class="bg-white rounded-2xl p-5 border shadow-sm flex flex-col justify-center border-l-4 border-l-emerald-400"><p class="text-[11px] font-bold text-slate-500 mb-1">완료 (출하)</p><p class="text-2xl font-black text-emerald-600" id="dash-pd-completed">0</p></div>
            <div class="bg-white rounded-2xl p-5 border shadow-sm flex flex-col justify-center border-l-4 border-l-rose-400"><p class="text-[11px] font-bold text-slate-500 mb-1">지연/위험 PJT</p><p class="text-2xl font-black text-rose-600" id="dash-pd-delayed">0</p></div>
            <div class="bg-white rounded-2xl p-5 border shadow-sm flex flex-col justify-center border-l-4 border-l-indigo-400"><p class="text-[11px] font-bold text-slate-500 mb-1">총 예정 공수</p><p class="text-2xl font-black text-indigo-600"><span id="dash-pd-estMd">0</span><span class="text-[10px] text-slate-400 ml-1">MD</span></p></div>
            <div class="bg-white rounded-2xl p-5 border shadow-sm flex flex-col justify-center border-l-4 border-l-purple-400"><p class="text-[11px] font-bold text-slate-500 mb-1">총 투입 공수</p><p class="text-2xl font-black text-purple-600"><span id="dash-pd-curMd">0</span><span class="text-[10px] text-slate-400 ml-1">MD</span></p></div>
            <div class="bg-white rounded-2xl p-5 border shadow-sm flex flex-col justify-center border-l-4 border-l-amber-400"><p class="text-[11px] font-bold text-slate-500 mb-1">편차율</p><p class="text-2xl font-black text-amber-600" id="dash-pd-variance">0%</p></div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-3xl p-5 border shadow-sm flex flex-col h-[280px]"><h3 class="text-sm font-extrabold text-slate-700 mb-3 border-b pb-2">진행상태 비율</h3><div class="flex-1 relative w-full h-full pb-2"><canvas id="projPieChart"></canvas></div></div>
            <div class="bg-white rounded-3xl p-5 border shadow-sm flex flex-col h-[280px]"><h3 class="text-sm font-extrabold text-slate-700 mb-3 border-b pb-2">월별 출하 추이</h3><div class="flex-1 relative w-full h-full pb-2"><canvas id="projMonthlyChart"></canvas></div></div>
            <div class="bg-white rounded-3xl p-5 border shadow-sm flex flex-col h-[280px]"><h3 class="text-sm font-extrabold text-slate-700 mb-3 border-b pb-2">월별 계획/실적 공수</h3><div class="flex-1 relative w-full h-full pb-2"><canvas id="annualPlanVsActualChart"></canvas></div></div>
        </div>
    </div>
</div>
