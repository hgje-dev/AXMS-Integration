<div class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
        <div class="bg-white rounded-2xl p-5 border shadow-sm flex flex-col justify-center border-l-4 border-l-slate-300 cursor-pointer hover:ring-2 ring-slate-200 transition-all" onclick="window.filterProjectStatus('pending')">
            <div class="flex justify-between items-center"><span class="text-[11px] font-bold text-slate-500"><i class="fa-solid fa-pause text-slate-400"></i> 대기 / 보류</span><span class="text-2xl font-black text-slate-700" id="mini-dash-pending">0</span></div>
        </div>
        <div class="bg-white rounded-2xl p-5 border shadow-sm flex flex-col justify-center border-l-4 border-l-blue-400 cursor-pointer hover:ring-2 ring-blue-200 transition-all" onclick="window.filterProjectStatus('progress')">
            <div class="flex justify-between items-center"><span class="text-[11px] font-bold text-blue-600"><i class="fa-solid fa-person-digging"></i> 진행 중</span><span class="text-2xl font-black text-blue-700" id="mini-dash-progress">0</span></div>
        </div>
        <div class="bg-emerald-50 rounded-2xl p-5 border border-emerald-100 shadow-sm flex flex-col justify-center border-l-4 border-l-emerald-400 cursor-pointer hover:ring-2 ring-emerald-300 transition-all" onclick="window.filterProjectStatus('completed')">
            <div class="flex justify-between items-center"><span class="text-[11px] font-bold text-emerald-600" id="mini-dash-completed-label"><i class="fa-solid fa-truck-fast"></i> 출하 완료</span><span class="text-2xl font-black text-emerald-700" id="mini-dash-completed">0</span></div>
        </div>
        <div class="bg-rose-50 rounded-2xl p-4 border border-rose-100 shadow-sm flex flex-col justify-start border-l-4 border-l-rose-400 col-span-1 overflow-hidden relative">
            <span class="text-[11px] font-bold text-rose-600 mb-2"><i class="fa-solid fa-clock"></i> 7일 이내 출하 예정 (D-7)</span><div id="mini-dash-upcoming" class="flex flex-wrap gap-1 w-full mt-1"></div>
        </div>
        <div class="bg-orange-50 rounded-2xl p-4 border border-orange-100 shadow-sm flex flex-col justify-start border-l-4 border-l-orange-400 col-span-1 overflow-hidden relative">
            <span class="text-[11px] font-bold text-orange-600 mb-2"><i class="fa-solid fa-clock"></i> 14일 이내 출하 예정 (D-14)</span><div id="mini-dash-upcoming-14" class="flex flex-wrap gap-1 w-full mt-1"></div>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[80vh]">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 flex-shrink-0">
            <div class="flex items-center gap-4"><h3 class="font-extrabold text-slate-800 text-lg"><i class="fa-solid fa-table-list text-indigo-500"></i> <span id="pjt-dash-title-label">PJT 현황판</span></h3><div class="flex bg-slate-200/50 p-1 rounded-lg ml-2"><button onclick="window.switchProjPartTab('제조')" id="btn-part-mfg" class="px-4 py-1.5 text-xs font-bold bg-white shadow-sm rounded-md text-indigo-700">제조파트</button><button onclick="window.switchProjPartTab('광학')" id="btn-part-opt" class="px-4 py-1.5 text-xs font-bold text-slate-500 rounded-md">광학파트</button></div></div>
            <div class="flex gap-2 items-center">
                <span class="text-[10px] text-slate-400 font-bold mr-2 hidden md:block" id="pjt-last-update-wrapper">최근 업데이트: <span id="pjt-last-update" class="text-slate-600">-</span></span>
                <button onclick="window.openTeamModal()" class="text-[10px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 px-3 py-1.5 rounded-lg shadow-sm mr-2 hover:bg-indigo-100 transition-colors"><i class="fa-solid fa-users"></i> 팀원 관리</button>
                <div class="flex gap-2 items-center">
                    <input type="month" id="filter-month-select" onchange="window.filterByMonth(this.value)" class="pl-3 pr-3 py-1.5 text-xs border border-slate-300 rounded-lg outline-none font-bold text-slate-500 cursor-pointer" title="월별 필터">
                    <button onclick="window.filterProjectStatus('all')" class="px-3 py-1.5 text-[10px] font-bold bg-slate-800 hover:bg-slate-700 text-white rounded-lg shadow-sm transition-colors whitespace-nowrap"><i class="fa-solid fa-rotate-right"></i> 필터 초기화</button>
                    <input type="text" id="proj-search" placeholder="검색..." oninput="window.searchProjectBoard(this.value)" class="pl-3 pr-3 py-1.5 text-xs border border-slate-300 rounded-lg outline-none w-32 font-bold focus:border-indigo-500">
                </div>
                <button onclick="window.toggleProjDashView('list')" id="btn-pd-list" class="px-3 py-1.5 text-xs font-bold bg-slate-200 rounded-md text-slate-700 transition-colors"><i class="fa-solid fa-list"></i> 리스트</button>
                <button onclick="window.toggleProjDashView('gantt')" id="btn-pd-gantt" class="px-3 py-1.5 text-xs font-bold bg-white border rounded-md text-slate-500 hover:bg-slate-50 transition-colors"><i class="fa-solid fa-bars-staggered"></i> 간트차트</button>
                <button onclick="window.toggleProjDashView('calendar')" id="btn-pd-calendar" class="px-3 py-1.5 text-xs font-bold bg-white border rounded-md text-slate-500 hover:bg-slate-50 transition-colors"><i class="fa-regular fa-calendar"></i> 달력뷰</button>
                <button onclick="window.openProjStatusWriteModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-md ml-2 transition-colors"><i class="fa-solid fa-plus"></i> 현황 등록</button>
            </div>
        </div>
        <div id="proj-dash-list-container" class="flex-1 overflow-auto custom-scrollbar bg-slate-50/30 p-4">
            <table class="min-w-max w-full text-left border-collapse bg-white border shadow-sm">
                <thead class="bg-slate-800 text-[10px] text-white font-bold sticky top-0 z-20 shadow-sm">
                    <tr><th class="border border-slate-600 px-2 py-2 text-center sticky left-0 z-30 bg-slate-800 w-16">관리</th><th class="border border-slate-600 px-1 py-1 text-center w-24 bg-slate-800"><select id="filter-category-select" onchange="window.filterByCategory(this.value)" class="bg-transparent text-white w-full h-full outline-none text-center text-[10px] font-bold appearance-none cursor-pointer"><option value="all" class="text-slate-800">구분(전체) ▼</option><option value="설비" class="text-slate-800">설비</option><option value="개조" class="text-slate-800">개조</option><option value="모듈" class="text-slate-800">모듈</option><option value="기타" class="text-slate-800">기타</option></select></th><th class="border border-slate-600 px-2 py-2 text-center text-amber-300 w-16">코멘트</th><th class="border border-slate-600 px-2 py-2 text-center text-rose-300 w-16">이슈</th><th class="border border-slate-600 px-2 py-2 text-center">PJT 코드</th><th class="border border-slate-600 px-2 py-2 text-center">프로젝트명</th><th class="border border-slate-600 px-2 py-2 text-center">업체명</th><th class="border border-slate-600 px-2 py-2 text-center text-emerald-300">진행률</th><th class="border border-slate-600 px-2 py-2 text-center">현재상태</th><th class="border border-slate-600 px-2 py-2 text-center">담당자</th><th class="border border-slate-600 px-2 py-2 text-center text-sky-300">생산일지</th><th class="border border-slate-600 px-2 py-2 text-center text-sky-300">예정MD</th><th class="border border-slate-600 px-2 py-2 text-center text-purple-300">투입MD</th><th class="border border-slate-600 px-2 py-2 text-center text-sky-300">최종MD</th><th class="border border-slate-600 px-2 py-2 text-center text-amber-300">총인원</th><th class="border border-slate-600 px-2 py-2 text-center text-amber-300">외주인원</th><th class="border border-slate-600 px-2 py-2 text-center text-amber-300">외주MD</th><th class="border border-slate-600 px-2 py-2 text-center bg-rose-900/50 text-rose-200">출하예정</th><th class="border border-slate-600 px-2 py-2 text-center bg-indigo-900/50">조립예정</th><th class="border border-slate-600 px-2 py-2 text-center bg-indigo-900/50">완료예정</th><th class="border border-slate-600 px-2 py-2 text-center bg-indigo-900/80">조립(실)</th><th class="border border-slate-600 px-2 py-2 text-center bg-indigo-900/80">완료(실)</th><th class="border border-slate-600 px-2 py-2 text-center bg-teal-900/50">검수(실)</th><th class="border border-slate-600 px-2 py-2 text-center bg-teal-900/50">완료(실)</th><th class="border border-slate-600 px-2 py-2 text-center bg-rose-900/80 text-rose-200">출하(최종)</th><th class="border border-slate-600 px-2 py-2 text-center bg-slate-700">Set시작</th><th class="border border-slate-600 px-2 py-2 text-center bg-slate-700">Set종료</th><th class="border border-slate-600 px-2 py-2 text-center bg-emerald-700 text-emerald-100 min-w-[100px]">링크</th></tr>
                </thead>
                <tbody id="proj-dash-tbody" class="text-[10px] text-slate-700 divide-y divide-slate-200"></tbody>
            </table>
        </div>
        <div id="proj-dash-gantt-container" class="hidden flex-1 overflow-auto bg-slate-50 border-t p-4 flex flex-col"><div class="flex justify-end gap-4 mb-2 text-[10px] font-bold text-slate-600 bg-white p-2 rounded-lg shadow-sm border border-slate-200"><div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-indigo-500 shadow-sm"></span>조립</div><div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-teal-500 shadow-sm"></span>검수</div><div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-slate-600 shadow-sm"></span>Setup</div><div class="flex items-center gap-1.5"><span class="w-3 h-3 transform rotate-45 bg-rose-500 border border-white shadow-sm"></span>출하예정/완료</div><div class="flex items-center gap-1.5 ml-2 border-l pl-3"><span class="w-1 h-3 bg-rose-500"></span>오늘 기준선</div></div><div id="proj-dash-gantt-content" class="bg-white rounded-xl shadow-sm border border-slate-200 flex-1 relative min-h-[500px]"></div></div>
        <div id="proj-dash-calendar-container" class="hidden flex-1 overflow-auto bg-slate-50 border-t p-6 flex flex-col"><div id="proj-dash-calendar-content" class="bg-white rounded-xl shadow-sm border border-slate-200 flex-1 p-4"></div></div>
    </div>
</div>
