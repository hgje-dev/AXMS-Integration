<div class="space-y-6 max-w-7xl mx-auto pb-10">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
        <div class="px-6 py-4 flex flex-col md:flex-row justify-between items-center bg-white gap-4 border-b border-slate-100">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center shadow-inner">
                    <i class="fa-regular fa-handshake text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-xl font-black text-slate-800 flex items-center gap-2" id="req-header-title">요청서 관리</h2>
                    <p class="text-xs text-slate-500 font-bold mt-1">AXBIS 통합 요청 관리 시스템</p>
                </div>
            </div>
            <button onclick="window.openWriteModal()" class="bg-indigo-600 hover:bg-indigo-700 transition-colors text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> 새 요청서 작성
            </button>
        </div>
        
        <div id="request-list-container" class="overflow-x-auto min-h-[500px] p-4 bg-slate-50/50">
            <table class="w-full text-left border-collapse bg-white border border-slate-200 shadow-sm rounded-xl overflow-hidden">
                <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-wider">
                    <tr>
                        <th class="p-4 font-bold text-center w-24">현재 상태</th>
                        <th class="p-4 font-bold w-24 text-center">구분</th>
                        <th class="p-4 font-bold">요청 제목 (프로젝트명)</th>
                        <th class="p-4 font-bold text-center">요청자</th>
                        <th class="p-4 font-bold text-center w-32">예정 MD</th>
                        <th class="p-4 font-bold text-center w-32">등록일</th>
                        <th class="p-4 font-bold text-center w-24">기능</th>
                    </tr>
                </thead>
                <tbody id="request-tbody" class="divide-y divide-slate-100 text-xs"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="write-modal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-slate-900/70 backdrop-blur-sm py-10">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl flex flex-col h-[800px] md:h-[90vh] overflow-hidden transform transition-all">
        <div class="px-6 py-5 border-b flex justify-between items-center bg-white shadow-sm z-10">
            <h2 class="text-lg font-black text-indigo-800 flex items-center gap-2" id="req-modal-title">새 협업/조립 요청서</h2>
            <div class="flex items-center gap-3">
                <span id="req-modal-status-badge" class="hidden text-[10px] font-bold px-2 py-0.5 rounded-full"></span>
                <button onclick="window.closeWriteModal()" class="text-slate-400 hover:text-rose-500 transition-colors p-1"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
        </div>
        
        <div class="p-6 overflow-y-auto custom-scrollbar flex-1 bg-slate-50 space-y-6 min-h-0 relative">
            <input type="hidden" id="req-id">
            
            <div id="google-auth-section" class="bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm text-amber-500"><i class="fa-brands fa-google"></i></div>
                    <div>
                        <p class="text-[11px] font-bold text-amber-800">구글 계정 연동 필요</p>
                        <p class="text-[10px] text-amber-600 mt-0.5">파일 업로드 및 메일 발송을 위해 구글 계정 인증이 필요합니다.</p>
                    </div>
                </div>
                <button onclick="window.authenticateGoogle()" id="btn-google-auth" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm whitespace-nowrap">연동하기</button>
                <div id="google-auth-status" class="hidden text-xs font-bold text-emerald-600"><i class="fa-solid fa-check"></i> 연동 완료</div>
            </div>

            <div id="collab-form-fields" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-5 hidden">
                <div class="flex flex-col gap-2">
                    <label class="text-[11px] font-bold text-slate-500">구분 <span class="text-rose-500">*</span></label>
                    <div class="flex gap-2">
                        <label class="flex-1 cursor-pointer relative">
                            <input type="radio" name="req-category" value="협업" class="peer absolute w-0 h-0 opacity-0" checked>
                            <div class="border border-slate-200 text-center py-2.5 rounded-xl text-sm font-bold text-slate-500 peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 transition-all shadow-sm">협업</div>
                        </label>
                        <label class="flex-1 cursor-pointer relative">
                            <input type="radio" name="req-category" value="조립" class="peer absolute w-0 h-0 opacity-0">
                            <div class="border border-slate-200 text-center py-2.5 rounded-xl text-sm font-bold text-slate-500 peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 transition-all shadow-sm">조립</div>
                        </label>
                        <label class="flex-1 cursor-pointer relative">
                            <input type="radio" name="req-category" value="이설" class="peer absolute w-0 h-0 opacity-0">
                            <div class="border border-slate-200 text-center py-2.5 rounded-xl text-sm font-bold text-slate-500 peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 transition-all shadow-sm">이설</div>
                        </label>
                        <label class="flex-1 cursor-pointer relative">
                            <input type="radio" name="req-category" value="설치" class="peer absolute w-0 h-0 opacity-0">
                            <div class="border border-slate-200 text-center py-2.5 rounded-xl text-sm font-bold text-slate-500 peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 transition-all shadow-sm">설치</div>
                        </label>
                        <label class="flex-1 cursor-pointer relative">
                            <input type="radio" name="req-category" value="Setup" class="peer absolute w-0 h-0 opacity-0">
                            <div class="border border-slate-200 text-center py-2.5 rounded-xl text-sm font-bold text-slate-500 peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 transition-all shadow-sm">Setup</div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">프로젝트 코드</label>
                        <input type="text" id="req-pjt-code" placeholder="예: PRJ-2024-001" oninput="window.showAutocomplete(this,'req-pjt-name','req-company',false)" autocomplete="off" class="w-full border border-slate-300 px-4 py-2.5 rounded-xl text-sm outline-indigo-500 bg-slate-50 focus:bg-white transition-colors font-semibold">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">프로젝트명 <span class="text-rose-500">*</span></label>
                        <input type="text" id="req-pjt-name" placeholder="프로젝트명을 입력하세요" oninput="window.showAutocomplete(this,'req-pjt-code','req-company',true)" autocomplete="off" class="w-full border border-slate-300 px-4 py-2.5 rounded-xl text-sm outline-indigo-500 bg-slate-50 focus:bg-white transition-colors font-bold">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">고객사</label>
                        <input type="text" id="req-company" placeholder="고객사명" class="w-full border border-slate-300 px-4 py-2.5 rounded-xl text-sm outline-indigo-500 bg-slate-50 focus:bg-white transition-colors font-semibold">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">장소</label>
                        <input type="text" id="req-location" placeholder="작업/협업 장소" class="w-full border border-slate-300 px-4 py-2.5 rounded-xl text-sm outline-indigo-500 bg-slate-50 focus:bg-white transition-colors font-semibold">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">시작 예상일 <span class="text-rose-500">*</span></label>
                        <input type="date" id="req-start-date" class="w-full border border-slate-300 px-4 py-2.5 rounded-xl text-sm outline-indigo-500 bg-slate-50 focus:bg-white transition-colors font-bold text-slate-600">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">종료 예상일 <span class="text-rose-500">*</span></label>
                        <input type="date" id="req-end-date" class="w-full border border-slate-300 px-4 py-2.5 rounded-xl text-sm outline-indigo-500 bg-slate-50 focus:bg-white transition-colors font-bold text-slate-600">
                    </div>
                    <div class="col-span-2 relative">
                        <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">예정 MD</label>
                        <input type="number" id="req-est-md" step="0.1" placeholder="0.0" class="w-1/2 border border-slate-300 px-4 py-2.5 rounded-xl text-sm outline-indigo-500 bg-slate-50 focus:bg-white transition-colors font-black text-indigo-700">
                        <span class="absolute left-[45%] top-8 text-xs font-bold text-slate-400">MD</span>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">요청 내용 <span class="text-rose-500">*</span></label>
                    <textarea id="req-content" placeholder="상세 요청 내용을 입력해주세요." class="w-full border border-slate-300 px-4 py-3 rounded-xl text-sm outline-indigo-500 h-28 resize-none custom-scrollbar bg-slate-50 focus:bg-white transition-colors font-medium"></textarea>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <label class="text-[11px] font-bold text-slate-500 mb-2 flex items-center gap-1.5"><i class="fa-brands fa-google-drive text-emerald-500"></i> 첨부 파일 (구글 드라이브 연동)</label>
                <input type="file" id="req-file" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer transition-all">
                <div id="req-file-link-wrap" class="mt-2 text-xs font-bold hidden">
                    <a id="req-file-link" href="#" target="_blank" class="text-sky-500 hover:text-sky-700 underline break-all flex items-center gap-1"><i class="fa-solid fa-arrow-up-right-from-square"></i> 첨부된 파일 보기</a>
                </div>
            </div>

        </div>

        <div class="px-6 py-4 border-t border-slate-200 bg-white flex justify-between items-center gap-3 z-10">
            <div id="admin-actions" class="flex gap-2 hidden">
                <button id="btn-admin-accept" onclick="window.acceptRequest()" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2.5 rounded-xl text-sm font-bold transition-colors flex items-center gap-1.5 shadow-sm"><i class="fa-solid fa-play"></i> 접수 완료(진행)</button>
                <button id="btn-admin-complete" onclick="window.completeRequest()" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-4 py-2.5 rounded-xl text-sm font-bold transition-colors flex items-center gap-1.5 shadow-sm"><i class="fa-solid fa-check"></i> 작업 완료 처리</button>
            </div>
            
            <div class="flex gap-2 ml-auto">
                <button onclick="window.closeWriteModal()" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-600 px-6 py-2.5 rounded-xl text-sm font-bold transition-colors shadow-sm">취소</button>
                <button id="btn-req-save" onclick="window.saveRequest(this)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-md transition-colors flex items-center gap-2"><i class="fa-regular fa-paper-plane"></i> 저장 및 메일 발송</button>
            </div>
        </div>
    </div>
</div>
