<div class="flex items-center justify-between gap-2 overflow-x-auto bg-slate-50 p-3 rounded-2xl border shadow-sm mb-6">
    <h2 class="text-lg font-black text-slate-800 ml-2">공수 시뮬레이션 Pro</h2>
    <div class="flex items-center gap-2">
        <button onclick="window.saveToFirestore(false)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition-colors"><i class="fa-solid fa-cloud-arrow-up"></i> 클라우드 저장</button>
        <button onclick="window.exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition-colors"><i class="fa-solid fa-file-excel"></i> 엑셀 다운로드</button>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
    
    <div class="lg:col-span-7 space-y-8">
        
        <section class="bg-white rounded-3xl shadow-sm border overflow-hidden">
            <div class="px-8 py-5 border-b bg-slate-50 flex justify-between">
                <h2 class="text-sm font-extrabold flex items-center gap-2"><i class="fa-solid fa-sliders text-slate-400"></i> 환경 설정</h2>
                <div class="flex items-center gap-2">
                    <select id="sim-method" class="border rounded-lg px-2 py-1 text-xs" onchange="window.handleMethodChange()">
                        <option value="mc">몬테카를로</option>
                        <option value="pert">3점 추정</option>
                    </select>
                    <select id="eq-type" class="border rounded-lg px-2 py-1 text-xs" onchange="window.handleTypeChange()"></select>
                </div>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-50/30">
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1">장비 대수</label><input type="number" id="equip-qty" value="1" class="w-full border rounded-xl px-3 py-2 text-right calc-trigger"></div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1">학습 곡선 (%)</label><input type="number" id="learning-curve" value="95" class="w-full border rounded-xl px-3 py-2 text-right calc-trigger"></div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1">난이도 보정</label><input type="number" id="diff-multiplier" value="1.0" class="w-full border rounded-xl px-3 py-2 text-right calc-trigger"></div>
            </div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm border overflow-hidden border-l-8 border-l-indigo-500">
            <div class="px-8 py-5 border-b flex justify-between items-center">
                <h2 class="text-sm font-extrabold flex items-center gap-2"><i class="fa-solid fa-list-ol text-indigo-500"></i> 공정 데이터</h2>
                <button onclick="window.addProcessRow()" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold">+ 추가</button>
            </div>
            <div class="overflow-x-auto max-h-[500px]">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50 sticky top-0" id="process-thead"></thead>
                    <tbody class="bg-white divide-y" id="process-tbody"></tbody>
                </table>
            </div>
        </section>
        
        <div id="dynamic-unit-sections" class="space-y-6"></div>
    </div>

    <div class="lg:col-span-5 space-y-8 lg:sticky lg:top-24">
        
        <section class="glass-dark rounded-3xl shadow-2xl text-white p-8 relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-extrabold text-slate-100"><i class="fa-solid fa-bolt text-indigo-400"></i> 결과 대시보드</h2>
            </div>
            <div class="bg-slate-800/60 rounded-[1.5rem] p-7 mb-4 shadow-xl border border-slate-700">
                <p class="text-indigo-300 text-[11px] font-extrabold mb-2">P50 (평균 공수)</p>
                <div class="flex items-baseline gap-2"><span id="out-p50-md" class="text-6xl font-black">0.0</span><span class="text-lg font-bold text-slate-400">MD</span></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800/40 rounded-2xl p-5 border border-slate-700/60">
                    <p class="text-emerald-400 text-[10px] font-extrabold mb-1">P10 (낙관)</p>
                    <div class="font-bold text-2xl text-slate-100"><span id="out-p10-md">0.0</span><span class="text-xs text-slate-500 ml-1">MD</span></div>
                </div>
                <div class="bg-slate-800/40 rounded-2xl p-5 border border-slate-700/60">
                    <p class="text-rose-400 text-[10px] font-extrabold mb-1">P90 (안전)</p>
                    <div class="font-bold text-2xl text-slate-100"><span id="out-p90-md">0.0</span><span class="text-xs text-slate-500 ml-1">MD</span></div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm border p-6 h-[300px] flex flex-col">
            <h3 class="text-xs font-extrabold text-slate-700 mb-2 border-b pb-2">📊 공수 확률 분포</h3>
            <div class="flex-1 relative w-full h-full"><canvas id="chart-canvas"></canvas></div>
        </section>

        <section class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl shadow-2xl p-7 text-white border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[13px] font-black flex items-center gap-2 text-indigo-300"><i class="fa-solid fa-robot text-lg"></i> AI Insight & Report</h3>
                <button onclick="window.generateGroqInsight()" class="bg-indigo-500/20 text-indigo-200 border border-indigo-500/30 px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow-md">분석 실행</button>
            </div>
            <div id="ai-briefing-text" class="text-sm text-slate-300 leading-relaxed min-h-[60px]">AI 분석을 실행해주세요.</div>
        </section>
    </div>
</div>

<div class="w-full mt-8 mb-12">
    <section class="bg-white rounded-3xl shadow-sm border overflow-hidden">
        <div class="bg-slate-50 px-8 py-5 border-b">
            <h2 class="text-base font-extrabold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-layer-group text-indigo-500"></i> 전체 공정 타임라인 (Gantt Chart)</h2>
        </div>
        <div class="p-8 overflow-x-auto min-h-[250px]"><div id="gantt-container" class="min-w-[900px]"></div></div>
    </section>
</div>
