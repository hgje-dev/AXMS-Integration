<div id="weekly-my-view" class="hidden space-y-6">
        <div class="flex flex-wrap justify-between items-center bg-white p-4 rounded-2xl border border-slate-200 shadow-sm gap-4">
            <div class="flex items-center gap-4">
                <h3 class="text-base font-black text-slate-800 whitespace-nowrap"><i class="fa-regular fa-calendar-user text-indigo-500 mr-2"></i> 이번 주 개인 일정</h3>
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button id="btn-my-sch-kanban" onclick="window.setMySchViewMode('kanban')" class="px-4 py-1.5 text-xs font-bold bg-white text-indigo-700 shadow-sm rounded-lg transition-all flex items-center gap-1.5 whitespace-nowrap">
                        <i class="fa-solid fa-columns"></i> 칸반 뷰
                    </button>
                    <button id="btn-my-sch-calendar" onclick="window.setMySchViewMode('calendar')" class="px-4 py-1.5 text-xs font-bold text-slate-500 hover:text-slate-700 rounded-lg transition-all flex items-center gap-1.5 bg-transparent whitespace-nowrap">
                        <i class="fa-regular fa-calendar-days"></i> 달력 뷰
                    </button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1">
                    <button id="btn-my-cal-prev" onclick="window.changeMyCalMonth(-1)" class="hidden p-1.5 text-slate-400 hover:bg-slate-100 rounded transition-colors"><i class="fa-solid fa-chevron-left"></i></button>
                    <span id="my-sch-cal-month-display" class="hidden text-sm font-bold text-indigo-700 mx-2"></span>
                    <button id="btn-my-cal-next" onclick="window.changeMyCalMonth(1)" class="hidden p-1.5 text-slate-400 hover:bg-slate-100 rounded transition-colors"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <button onclick="window.openScheduleModal()" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-4 py-2 rounded-xl text-xs font-bold transition-colors border border-indigo-100 flex items-center gap-1.5 whitespace-nowrap"><i class="fa-solid fa-plus"></i> 일정 추가</button>
            </div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-7 gap-4" id="weekly-kanban-board"></div>
        <div class="hidden bg-white rounded-2xl border border-slate-200 overflow-hidden flex-col shadow-sm" id="weekly-my-calendar-board"></div>
    </div>
