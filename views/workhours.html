<div class="flex flex-col gap-6 h-full min-h-[80vh] relative pb-20">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 flex flex-wrap gap-4 items-center justify-between z-20 sticky top-0">
        <div class="flex items-center gap-3">
            <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center shadow-sm">
                    <i class="fa-solid fa-business-time text-xl"></i>
                </div>
                투입공수 관리 시스템
            </h2>
        </div>
        <div class="flex items-center gap-2 sm:gap-4 flex-wrap justify-end">
            <button onclick="window.openTeamModal()" class="text-[11px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-2 rounded-xl transition-colors border border-indigo-100 flex items-center gap-1.5 whitespace-nowrap">
                <i class="fa-solid fa-users-gear"></i> 
                팀원 관리
            </button>
            
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button id="wh-btn-grid" onclick="window.setWhViewMode('grid')" class="px-4 py-1.5 text-xs font-bold bg-white text-indigo-700 shadow-sm rounded-lg transition-all flex items-center gap-1.5">
                    <i class="fa-solid fa-table"></i> 
                    현황판
                </button>
                <button id="wh-btn-calendar" onclick="window.setWhViewMode('calendar')" class="px-4 py-1.5 text-xs font-bold text-slate-500 hover:text-slate-700 rounded-lg transition-all flex items-center gap-1.5">
                    <i class="fa-regular fa-calendar-days"></i> 
                    달력
                </button>
            </div>
            
            <div class="flex items-center bg-white border border-slate-200 rounded-xl p-1 shadow-sm relative group">
                <button onclick="window.changeWhWeek(-1)" class="px-3 py-1.5 text-slate-400 hover:text-indigo-600 hover:bg-slate-50 rounded-lg transition-all z-10">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="relative flex items-center justify-center px-4 cursor-pointer z-10 min-w-[140px] h-full" onclick="document.getElementById('wh-week-picker').showPicker()">
                    <span id="wh-week-display" class="text-sm font-black text-slate-700 group-hover:text-indigo-600 transition-colors">
                        로딩중...
                    </span>
                    <i class="fa-regular fa-calendar ml-2 text-slate-400 group-hover:text-indigo-500 transition-colors"></i>
                    <input type="week" id="wh-week-picker" class="absolute w-0 h-0 opacity-0 -z-10" onchange="window.loadWorkhoursData()">
                </div>
                <button onclick="window.changeWhWeek(1)" class="px-3 py-1.5 text-slate-400 hover:text-indigo-600 hover:bg-slate-50 rounded-lg transition-all z-10">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            
            <div class="flex gap-2">
                <button onclick="window.saveWorkhoursToDrive()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm transition-colors flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-brands fa-google-drive"></i> 
                    드라이브 저장
                </button>
                <button onclick="window.exportWorkhoursExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm transition-colors flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-solid fa-file-excel"></i> 
                    엑셀 다운로드
                </button>
            </div>
        </div>
    </div>

    <div class="bg-slate-50 rounded-3xl border border-slate-200 p-6 flex flex-col gap-6 transition-all duration-300">
        <div class="flex justify-between items-center flex-wrap gap-4">
            <div class="flex gap-2 bg-slate-200/50 p-1 rounded-full border border-slate-200">
                <button id="wh-btn-period-week" onclick="window.setWhStatMode('week')" class="px-4 py-1.5 text-xs font-bold bg-indigo-600 text-white shadow-sm rounded-full transition-all">
                    주간 통계
                </button>
                <button id="wh-btn-period-month" onclick="window.setWhStatMode('month')" class="px-4 py-1.5 text-xs font-bold text-slate-600 rounded-full transition-all hover:bg-slate-100">
                    월간 통계
                </button>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto flex-1 md:flex-none justify-end">
                <div class="relative w-full md:w-72">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                    <input type="text" id="wh-search-pjt" oninput="window.updateWhDashboard()" placeholder="PJT 코드/명칭 (초성) 검색..." class="w-full border border-slate-300 rounded-full pl-10 pr-4 py-2 text-xs font-bold text-indigo-700 outline-indigo-500 shadow-sm bg-white focus:ring-2 focus:ring-indigo-100 transition-all">
                </div>
                <button onclick="window.toggleWhDashboard()" id="wh-dash-toggle-btn" class="bg-white border border-slate-200 text-slate-600 hover:text-indigo-600 hover:border-indigo-300 px-4 py-2 rounded-full text-[11px] font-bold shadow-sm transition-all whitespace-nowrap flex items-center gap-1.5">
                    대시보드 숨기기 <i class="fa-solid fa-chevron-up"></i>
                </button>
            </div>
        </div>

        <div id="wh-dashboard-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 origin-top transition-all duration-300 ease-in-out">
            
            <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm flex flex-col relative overflow-hidden h-[260px]">
                <div class="absolute -right-4 -bottom-4 opacity-5">
                    <i class="fa-solid fa-stopwatch text-8xl text-indigo-500"></i>
                </div>
                <div class="flex justify-between items-start mb-1 relative z-10">
                    <span class="text-[11px] font-bold text-slate-500" id="wh-dash-period-label">해당 기간 총 투입 <span class="text-[9px] font-normal">(승인완료)</span></span>
                </div>
                <p class="text-4xl font-black text-indigo-600 relative z-10 mt-1 mb-2">
                    <span id="wh-dash-total-md">0.0</span>
                    <span class="text-base ml-1 font-bold text-indigo-400">MD</span>
                </p>
                
                <div id="wh-dash-pjt-breakdown" class="z-10 flex-1 overflow-y-auto custom-scrollbar border-t border-slate-100 pt-3 space-y-1.5 pr-2">
                </div>
            </div>
            
            <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm lg:col-span-1 flex flex-col h-[260px]">
                <span class="text-[10px] font-bold text-slate-600 mb-3 shrink-0">인원별 누적 투입 (Top 5)</span>
                <div class="relative w-full flex-1 min-h-0">
                    <canvas id="wh-chart-person"></canvas>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm lg:col-span-1 flex flex-col h-[260px]">
                <span class="text-[10px] font-bold text-slate-600 mb-3 shrink-0">작업 구분별 비율</span>
                <div class="relative w-full flex-1 min-h-0">
                    <canvas id="wh-chart-type"></canvas>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm lg:col-span-1 flex flex-col h-[260px]">
                <span id="wh-chart-trend-title" class="text-[10px] font-bold text-slate-600 mb-3 shrink-0">일자별 투입 추이</span>
                <div class="relative w-full flex-1 min-h-0">
                    <canvas id="wh-chart-trend"></canvas>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm lg:col-span-1 flex flex-col h-[260px] overflow-y-auto custom-scrollbar">
                <span class="text-[10px] font-bold text-slate-600 mb-2 border-b border-slate-100 pb-2 sticky top-0 bg-white z-10">현황 요약</span>
                <div id="wh-dash-extra" class="text-[11px] space-y-3 font-medium text-slate-600 pb-2 mt-1"></div>
            </div>
            
        </div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap gap-3 items-center">
        <span class="text-[11px] font-black text-slate-700 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
            <i class="fa-solid fa-filter text-slate-400 mr-1"></i> 
            보기 필터
        </span>
        <input type="text" id="wh-filter-text" placeholder="이름, 내용 검색" oninput="window.applyWhFilters()" class="border border-slate-200 rounded-lg px-3 py-1.5 text-xs outline-indigo-500 w-48 bg-slate-50 font-bold focus:bg-white">
        <select id="wh-filter-loc" onchange="window.applyWhFilters()" class="border border-slate-200 rounded-lg px-3 py-1.5 text-xs outline-indigo-500 bg-slate-50 cursor-pointer font-bold">
            <option value="">장소 (전체)</option>
            <option value="사내">사내</option>
            <option value="국내">국내</option>
            <option value="해외">해외</option>
        </select>
        <select id="wh-filter-type" onchange="window.applyWhFilters()" class="border border-slate-200 rounded-lg px-3 py-1.5 text-xs outline-indigo-500 bg-slate-50 cursor-pointer font-bold">
            <option value="">구분 (전체)</option>
            <option value="조립">조립</option>
            <option value="검수">검수</option>
            <option value="설치">설치</option>
            <option value="Setup">Setup</option>
            <option value="협업">협업</option>
            <option value="공통">공통</option>
            <option value="기타">기타</option>
        </select>
        <select id="wh-filter-status" onchange="window.applyWhFilters()" class="border border-slate-200 rounded-lg px-3 py-1.5 text-xs outline-indigo-500 bg-slate-50 cursor-pointer font-bold">
            <option value="">승인 상태 (전체)</option>
            <option value="true" class="text-emerald-600">승인 완료</option>
            <option value="false" class="text-rose-500">미승인</option>
        </select>
        
        <div class="flex bg-slate-100 p-1 rounded-xl ml-auto border border-slate-200 shadow-sm">
            <button id="wh-btn-member-all" onclick="window.setWhMemberMode('all')" class="px-4 py-1.5 text-xs font-bold bg-white text-indigo-700 shadow-sm rounded-lg transition-all whitespace-nowrap">
                팀원 전체
            </button>
            <button id="wh-btn-member-me" onclick="window.setWhMemberMode('me')" class="px-4 py-1.5 text-xs font-bold text-slate-500 hover:text-slate-700 rounded-lg transition-all bg-transparent whitespace-nowrap">
                나의 현황
            </button>
        </div>

        <button id="wh-btn-reset-filter" onclick="window.resetWhFilters()" class="hidden px-3 py-1.5 bg-slate-700 hover:bg-slate-800 transition-colors text-white rounded-lg text-[10px] font-bold shadow-sm">
            초기화
        </button>
    </div>

    <div id="wh-view-grid" class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex-1 flex flex-col relative select-none">
        <div class="px-4 py-2 bg-indigo-50/50 border-b border-indigo-100 flex justify-between items-center text-[10px] font-bold text-indigo-700">
            <span>
                <i class="fa-solid fa-mouse-pointer mr-1"></i> 마우스를 드래그하여 여러 칸을 선택하고 일괄 승인할 수 있습니다. 빈 칸을 클릭하면 입력창이 열립니다.
            </span>
            <div class="flex gap-3">
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-emerald-50 border border-emerald-300 inline-block"></span> 승인됨</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-white border border-slate-300 inline-block"></span> 미승인</span>
            </div>
        </div>
        <div class="overflow-x-auto flex-1 custom-scrollbar wh-drag-container" id="wh-grid-container">
            <table class="w-full text-left border-collapse min-w-max table-fixed">
                <thead class="bg-slate-50 text-slate-600 sticky top-0 z-20 shadow-sm border-b border-slate-200" id="wh-grid-thead"></thead>
                <tbody class="divide-y divide-slate-100 text-xs" id="wh-grid-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="wh-view-calendar" class="hidden bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex-1 flex flex-col">
        <div class="px-4 py-3 bg-slate-50 border-b border-slate-200 flex justify-between items-center z-10">
            <h3 class="text-sm font-black text-slate-700" id="wh-calendar-title"></h3>
            <span class="text-[10px] text-slate-500 font-bold">* 달력은 선택된 주차의 전체 월간(Monthly) 데이터를 표시합니다.</span>
        </div>
        <div class="grid grid-cols-7 gap-px bg-slate-200 border-b border-slate-200">
            <div class="p-2 text-center text-xs font-black text-rose-500 bg-slate-50">일</div>
            <div class="p-2 text-center text-xs font-black text-slate-700 bg-slate-50">월</div>
            <div class="p-2 text-center text-xs font-black text-slate-700 bg-slate-50">화</div>
            <div class="p-2 text-center text-xs font-black text-slate-700 bg-slate-50">수</div>
            <div class="p-2 text-center text-xs font-black text-slate-700 bg-slate-50">목</div>
            <div class="p-2 text-center text-xs font-black text-slate-700 bg-slate-50">금</div>
            <div class="p-2 text-center text-xs font-black text-rose-500 bg-slate-50">토</div>
        </div>
        <div id="wh-calendar-grid" class="grid grid-cols-7 gap-px bg-slate-200 flex-1"></div>
    </div>

    <div id="wh-floating-bar" class="hidden fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-4 border border-slate-700 animate-[bounce_1s_ease-in-out_infinite]">
        <span class="text-sm font-bold">
            <span id="wh-selected-count" class="text-indigo-400 font-black text-lg">0</span>개 항목 선택됨
        </span>
        <div class="w-px h-4 bg-slate-600"></div>
        <button onclick="window.whBulkConfirm(true)" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm">일괄 승인</button>
        <button onclick="window.whBulkConfirm(false)" class="bg-rose-500 hover:bg-rose-600 px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm">승인 취소</button>
        <button onclick="window.whClearSelection()" class="text-slate-400 hover:text-white px-2 py-1.5 text-xs font-bold transition-colors">선택 해제</button>
    </div>
</div>

<div id="wh-input-modal" class="fixed inset-0 z-[300] hidden items-center justify-center bg-slate-900/70 backdrop-blur-sm py-10">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-6xl flex flex-col h-[700px] md:h-[85vh] overflow-hidden transform transition-all">
        
        <div class="px-6 py-4 border-b flex justify-between items-center bg-indigo-50">
            <div>
                <h2 class="text-lg font-extrabold text-indigo-800 flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square"></i> 투입공수 기록
                </h2>
                <p id="wh-modal-subtitle" class="text-[11px] font-bold text-indigo-500 mt-1 bg-white px-2 py-0.5 rounded shadow-sm w-fit border border-indigo-100"></p>
            </div>
            <button onclick="window.closeWhInputModal()" class="text-slate-400 hover:text-rose-500 transition-colors p-1">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        
        <div class="p-6 bg-slate-50/50 flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-
