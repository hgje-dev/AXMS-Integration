<div id="wh-plan-modal" class="fixed inset-0 z-[300] hidden items-center justify-center bg-slate-900/60 backdrop-blur-md py-10 transition-opacity">
    <div class="bg-slate-50 rounded-[2rem] shadow-2xl w-full max-w-[1400px] flex flex-col h-[800px] md:h-[90vh] overflow-hidden transform transition-all border border-white/20">
        
        <div class="px-8 py-6 border-b border-slate-200 flex justify-between items-center bg-white z-10 shadow-sm shrink-0">
            <div>
                <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center shadow-inner">
                        <i class="fa-solid fa-clipboard-list"></i>
                    </div>
                    프로젝트별 투입 계획 관리 <span class="text-[11px] bg-amber-100 text-amber-700 px-2 py-1 rounded ml-2 font-bold shadow-sm">팀장 전용</span>
                </h2>
                <p class="text-[13px] font-bold text-slate-500 mt-2 flex items-center gap-2 tracking-wide">주간 단위로 인원을 계획하거나 월간 통계를 조회할 수 있습니다.</p>
            </div>
            <button onclick="window.closeWhPlanModal()" class="text-slate-400 hover:text-rose-500 hover:bg-rose-50 w-10 h-10 rounded-full transition-colors flex items-center justify-center">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>
        
        <div class="p-6 flex-1 overflow-hidden flex flex-col gap-4 min-h-0 bg-slate-50/50">
            <div class="flex justify-between items-center mb-2 px-1 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm shrink-0">
                <div class="flex items-center gap-4">
                    <div class="flex bg-slate-100 p-1 rounded-xl mr-2">
                        <button id="btn-plan-week" onclick="window.setWhPlanViewMode('week')" class="px-4 py-1.5 text-xs font-bold bg-white text-indigo-700 shadow-sm rounded-lg transition-all">주간 계획 (입력)</button>
                        <button id="btn-plan-month" onclick="window.setWhPlanViewMode('month')" class="px-4 py-1.5 text-xs font-bold text-slate-500 hover:text-slate-700 rounded-lg transition-all bg-transparent">월간 조회 (뷰어)</button>
                    </div>

                    <div id="wh-plan-week-control" class="flex items-center gap-2">
                        <label class="text-[12px] font-bold text-slate-600"><i class="fa-regular fa-calendar-check text-indigo-500 mr-1"></i>주차 선택:</label>
                        <div class="relative flex items-center justify-center bg-indigo-50 border border-indigo-200 hover:border-indigo-400 rounded-xl px-5 py-2.5 cursor-pointer group transition-all" onclick="document.getElementById('wh-plan-week').showPicker()">
                            <span id="wh-plan-week-display" class="text-sm font-black text-indigo-700">로딩중...</span>
                            <i class="fa-regular fa-calendar ml-3 text-indigo-400 group-hover:text-indigo-600 transition-colors"></i>
                            <input type="week" id="wh-plan-week" class="absolute w-0 h-0 opacity-0 -z-10" onchange="window.handleWhPlanWeekChange(this.value)">
                        </div>
                    </div>

                    <div id="wh-plan-month-control" class="hidden items-center gap-2">
                        <label class="text-[12px] font-bold text-slate-600"><i class="fa-regular fa-calendar-check text-indigo-500 mr-1"></i>월 선택:</label>
                        <input type="month" id="wh-plan-month" class="border border-indigo-200 bg-indigo-50 hover:border-indigo-400 rounded-xl px-4 py-2 text-sm font-black text-indigo-700 outline-none cursor-pointer transition-colors" onchange="window.handleWhPlanMonthChange(this.value)">
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="wh-plan-legend" class="text-[10px] font-bold text-slate-400 border border-slate-200 px-3 py-1.5 rounded-lg bg-slate-50 flex items-center gap-2">
                        <span class="text-amber-500">인=인원(명) 입력 시 M 자동 동기화</span>
                    </div>
                    <button id="wh-plan-add-btn" onclick="window.addWhPlanRow()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-md transition-all flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> 프로젝트 추가
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-visible relative flex-1 flex flex-col min-h-0">
                <div class="overflow-x-auto flex-1 custom-scrollbar">
                    <table class="w-full text-left border-collapse min-w-max table-fixed">
                        <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-wider sticky top-0 z-20 shadow-sm">
                            <tr id="wh-plan-grid-header"></tr>
                        </thead>
                        <tbody id="wh-plan-tbody" class="divide-y divide-slate-100 bg-white"></tbody>
                    </table>
                </div>
            </div>
            <p id="wh-plan-help-text" class="text-[11px] text-slate-400 font-bold text-right mt-1 shrink-0">* 상태가 '계획 확정'인 내역만 대시보드의 계획 대비 실적에 반영됩니다.</p>
        </div>

        <div id="wh-plan-footer-actions" class="px-8 py-5 border-t border-slate-200 bg-white flex justify-end gap-3 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] shrink-0">
            <button onclick="window.closeWhPlanModal()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-8 py-3 rounded-xl font-bold transition-colors text-sm shadow-sm">
                취소
            </button>
            <button onclick="window.saveWhPlans('draft')" class="bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 px-6 py-3 rounded-xl font-bold shadow-sm transition-all text-sm flex items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> 임시 저장
            </button>
            <button onclick="window.saveWhPlans('confirmed')" class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-xl font-bold shadow-md transition-all text-sm flex items-center gap-2">
                <i class="fa-solid fa-check-double"></i> 계획 저장 및 적용
            </button>
        </div>
    </div>
</div>
