<div id="wh-plan-modal" class="fixed inset-0 z-[300] hidden items-center justify-center bg-slate-900/60 backdrop-blur-md py-10 transition-opacity">
    <div class="bg-slate-50 rounded-[2rem] shadow-2xl w-full max-w-5xl flex flex-col h-[750px] md:h-[85vh] overflow-hidden transform transition-all border border-white/20">
        
        <div class="px-8 py-6 border-b border-slate-200 flex justify-between items-center bg-white z-10 shadow-sm">
            <div>
                <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center shadow-inner">
                        <i class="fa-solid fa-clipboard-list"></i>
                    </div>
                    프로젝트별 투입 계획 관리 <span class="text-[11px] bg-amber-100 text-amber-700 px-2 py-1 rounded ml-2 font-bold">팀장 전용</span>
                </h2>
                <p class="text-[13px] font-bold text-slate-500 mt-2 flex items-center gap-2 tracking-wide">주간 단위로 계획을 수립하면, 월간 데이터에 자동 합산됩니다.</p>
            </div>
            <button onclick="window.closeWhPlanModal()" class="text-slate-400 hover:text-rose-500 hover:bg-rose-50 w-10 h-10 rounded-full transition-colors flex items-center justify-center">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>
        
        <div class="p-8 flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-4 min-h-0 relative">
            <div class="flex justify-between items-center mb-2 px-1 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <label class="text-[12px] font-bold text-slate-600">계획 주차 선택:</label>
                    <div class="relative flex items-center justify-center bg-indigo-50 border border-indigo-200 hover:border-indigo-400 rounded-xl px-5 py-2.5 cursor-pointer group transition-all" onclick="document.getElementById('wh-plan-week').showPicker()">
                        <span id="wh-plan-week-display" class="text-sm font-black text-indigo-700">로딩중...</span>
                        <i class="fa-regular fa-calendar ml-2 text-indigo-400 group-hover:text-indigo-600 transition-colors"></i>
                        <input type="week" id="wh-plan-week" class="absolute w-0 h-0 opacity-0 -z-10" onchange="window.handleWhPlanWeekChange(this.value)">
                    </div>
                </div>
                <button onclick="window.addWhPlanRow()" class="bg-indigo-50 border border-indigo-200 text-indigo-600 hover:text-indigo-700 hover:bg-indigo-100 px-4 py-2 rounded-xl text-xs font-bold shadow-sm transition-all flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> 프로젝트 추가
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-visible relative">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/80 border-b border-slate-200 text-slate-500 text-[11px] uppercase tracking-wider">
                        <tr>
                            <th class="p-4 w-72 text-left font-black rounded-tl-2xl">프로젝트 검색 (초성/명칭 연동)</th>
                            <th class="p-4 w-32 text-center font-black text-amber-600">계획 인원 (명)</th>
                            <th class="p-4 w-32 text-center font-black text-indigo-600">계획 공수 (MD)</th>
                            <th class="p-4 text-left font-black">기타 메모</th>
                            <th class="p-4 w-24 text-center font-black text-emerald-600">상태</th>
                            <th class="p-4 w-16 text-center font-black text-rose-400 rounded-tr-2xl"><i class="fa-solid fa-trash-can"></i></th>
                        </tr>
                    </thead>
                    <tbody id="wh-plan-tbody" class="divide-y divide-slate-100 bg-white">
                        </tbody>
                </table>
            </div>
            <p class="text-[11px] text-slate-400 font-bold text-right mt-2 mr-2">* 계획 확정 체크 시 대시보드의 계획 대비 실적에 반영됩니다.</p>
        </div>

        <div class="px-8 py-5 border-t border-slate-200 bg-white flex justify-end gap-3 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onclick="window.closeWhPlanModal()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-8 py-3 rounded-xl font-bold transition-colors text-sm shadow-sm">
                취소
            </button>
            <button onclick="window.saveWhPlans('draft')" class="bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 px-6 py-3 rounded-xl font-bold shadow-sm transition-all text-sm flex items-center gap-2">
                <i class="fa-solid fa-floppy-disk"></i> 임시 저장
            </button>
            <button onclick="window.saveWhPlans('confirmed')" class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-xl font-bold shadow-md transition-all text-sm flex items-center gap-2">
                <i class="fa-solid fa-check-double"></i> 계획 저장 및 적용
            </button>
        </div>
        
    </div>
</div>
