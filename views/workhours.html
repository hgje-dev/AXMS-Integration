<div id="workhours-modal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-slate-900/70 backdrop-blur-sm py-10">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md flex flex-col overflow-hidden">
        <div class="px-6 py-4 border-b flex justify-between items-center bg-indigo-50">
            <h2 class="text-base font-extrabold text-indigo-800"><i class="fa-solid fa-pen-to-square"></i> 투입 공수 등록</h2>
            <button onclick="window.closeWorkhoursModal()" class="text-indigo-400 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="p-6 bg-slate-50 flex flex-col gap-4">
            <input type="hidden" id="wh-id">
            
            <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1">작업자</label><input type="text" id="wh-author-name" class="w-full border px-3 py-2 rounded-lg text-sm bg-slate-100 font-bold" readonly></div>
                <div><label class="block text-[11px] font-bold text-slate-500 mb-1">작업 일자</label><input type="date" id="wh-date" class="w-full border px-3 py-2 rounded-lg text-sm font-bold text-indigo-700 outline-indigo-500"></div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-1">프로젝트 선택 (코드 또는 명칭)</label>
                <select id="wh-project" class="w-full border px-3 py-2 rounded-lg text-sm font-bold text-slate-700 outline-indigo-500">
                    </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">작업 분류</label>
                    <select id="wh-type" class="w-full border px-3 py-2 rounded-lg text-sm outline-indigo-500">
                        <option value="조립">조립 (Assembly)</option>
                        <option value="셋업">셋업 (Setup)</option>
                        <option value="검수">검수 (Inspection)</option>
                        <option value="가공">가공 (Machining)</option>
                        <option value="설계">설계 (Design)</option>
                        <option value="기타">기타 (Others)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">투입 시간 (Hours)</label>
                    <div class="relative">
                        <input type="number" id="wh-hours" min="0.5" step="0.5" class="w-full border px-3 py-2 rounded-lg text-sm text-right font-black text-indigo-600 outline-indigo-500 pr-8" placeholder="예: 4">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400">h</span>
                    </div>
                </div>
            </div>
            
            <div id="wh-delete-wrap" class="hidden mt-2 text-right">
                <button onclick="window.deleteWorkhours()" class="text-[11px] text-rose-500 font-bold hover:underline"><i class="fa-solid fa-trash-can"></i> 이 공수 기록 삭제하기</button>
            </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end gap-2 bg-white">
            <button onclick="window.closeWorkhoursModal()" class="px-4 py-2 rounded-lg text-sm font-bold bg-slate-100 hover:bg-slate-200 text-slate-600">취소</button>
            <button onclick="window.saveWorkhours()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-sm">저장</button>
        </div>
    </div>
</div>
